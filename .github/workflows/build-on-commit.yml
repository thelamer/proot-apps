name: build-on-commit

on:
  push:
    branches:
      - master

jobs:
  firefox:
    on:
      push:
        paths:
          - apps/firefox/**
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: QEMU
        uses: docker/setup-qemu-action@v3
      - name: Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: cd apps/firefox/
      - run: docker buildx build --push --platform linux/amd64,linux/arm64 --tag ghcr.io/${{ github.actor }}/proot-apps:firefox .
